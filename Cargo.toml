mpl-token-metadata = "4.1.2"
redis = "0.25.4"
serde = "1.0.203"
solana-client = "2.0.1"
solana-sdk = "2.0.1"
solana-transaction-status = "2.0.1"
teloxide = "0.12.2"
tokio = { version = "1.38.0", features = ["full"] }
toml = "0.8.14"
url = "2.5.2"
