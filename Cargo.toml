[package]
name = "replika"
version = "0.0.0"
edition = "2021"

[dependencies]
actix-web = "4.8.0"
anchor-lang = "0.30.1"
anyhow = "1.0.86"
async-graphql = "7.0.6"
clap = { version = "4.5.8", features = ["derive"] }
diesel = { version = "2.2.1", features = ["postgres"] }
