services:
  postgres:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - /etc/takeover/pg:/var/lib/postgresql/data
  redis:
    image: redis:7.2.4-alpine
    restart: always
    volumes:
      - /etc/takeover/cache:/data
  replika:
    image: docker.io/clearloop/takeover:latest
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 256M
    restart: always
    command: ["-c", "/etc/config/config.toml", "-v"]
    depends_on:
      - postgres
      - redis
    volumes:
      - /home/ubuntu/takeover:/etc/config
    ports:
      - 5888:4000
